<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fornecedores ✨</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: linear-gradient(135deg, #fff0f5 0%, #fce4ec 40%, #f8bbda 100%); font-family: 'DM Sans', sans-serif; padding: 2rem 1rem; }
  .page { max-width: 820px; margin: 0 auto; }

  /* GATE */
  .gate { position: fixed; inset: 0; background: linear-gradient(135deg, #fff0f5, #fce4ec, #f8bbda); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; z-index: 100; }
  .gate-deco1 { position: absolute; width: 300px; height: 300px; background: #f48fb1; border-radius: 50%; opacity: 0.15; top: -100px; right: -80px; pointer-events: none; }
  .gate-deco2 { position: absolute; width: 200px; height: 200px; background: #ce93d8; border-radius: 50%; opacity: 0.15; bottom: -70px; left: -60px; pointer-events: none; }
  .gate-icon { font-size: 52px; color: #f06292; }
  .gate-title { font-family: 'Playfair Display', serif; font-size: 28px; color: #880e4f; font-weight: 600; }
  .gate-sub { font-size: 13px; color: #c2185b; opacity: 0.8; }
  .gate input { border: 2px solid rgba(240,98,146,0.3); border-radius: 14px; padding: 12px 20px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #880e4f; outline: none; text-align: center; letter-spacing: 3px; background: #fff; width: 240px; box-shadow: 0 2px 12px rgba(240,98,146,0.1); transition: border 0.2s; }
  .gate input:focus { border-color: #f06292; }
  .gate-btn { background: linear-gradient(90deg,#e91e8c,#f06292); color: #fff; border: none; border-radius: 24px; padding: 12px 36px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; box-shadow: 0 4px 16px rgba(233,30,140,0.3); transition: transform 0.15s; }
  .gate-btn:hover { transform: translateY(-2px); }
  .gate-err { font-size: 12px; color: #c2185b; min-height: 18px; }

  /* HEADER */
  .main-header { text-align: center; margin-bottom: 2rem; background: linear-gradient(135deg, #fff0f5, #fce4ec); border-radius: 24px; padding: 2rem; box-shadow: 0 4px 24px rgba(194,24,91,0.08); position: relative; overflow: hidden; }
  .main-header .deco1 { position: absolute; width: 200px; height: 200px; background: #f48fb1; border-radius: 50%; opacity: 0.15; top: -60px; right: -40px; pointer-events: none; }
  .badge { display: inline-block; background: #f06292; color: #fff; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 5px 18px; border-radius: 20px; margin-bottom: 10px; }
  .main-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; color: #880e4f; margin-bottom: 6px; }
  .main-sub { font-size: 13px; color: #c2185b; opacity: 0.8; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 1rem 0 0; }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, #f48fb1, transparent); }

  /* TOP BAR */
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  .mode-bar { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.7); border-radius: 12px; padding: 7px 14px; border: 1.5px solid rgba(240,98,146,0.18); }
  .mode-btn { font-size: 11px; font-family: 'DM Sans', sans-serif; padding: 5px 14px; border-radius: 20px; border: 1.5px solid rgba(240,98,146,0.3); cursor: pointer; background: transparent; color: #c2185b; font-weight: 500; transition: all 0.2s; }
  .mode-btn.active { background: linear-gradient(90deg,#e91e8c,#f06292); color: #fff; border-color: transparent; }
  .add-cat-btn { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(90deg,#e91e8c,#f06292); color: #fff; border: none; border-radius: 20px; padding: 9px 18px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; box-shadow: 0 3px 12px rgba(233,30,140,0.2); transition: transform 0.15s; }
  .add-cat-btn:hover { transform: translateY(-1px); }

  /* CATEGORIAS GRID */
  .cats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.2rem; }

  /* CARD */
  .cat-card { background: rgba(255,255,255,0.75); border-radius: 18px; border: 1.5px solid rgba(240,98,146,0.15); box-shadow: 0 4px 20px rgba(194,24,91,0.07); overflow: hidden; transition: box-shadow 0.2s; }
  .cat-card:hover { box-shadow: 0 6px 28px rgba(194,24,91,0.13); }
  .cat-header { background: linear-gradient(90deg,#f06292,#e91e8c); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .cat-name { font-family: 'Playfair Display', serif; font-size: 16px; color: #fff; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .cat-name-input { font-family: 'Playfair Display', serif; font-size: 15px; background: rgba(255,255,255,0.25); border: 1.5px solid rgba(255,255,255,0.5); border-radius: 8px; padding: 4px 10px; color: #fff; outline: none; width: 150px; }
  .cat-name-input::placeholder { color: rgba(255,255,255,0.7); }
  .cat-actions { display: flex; gap: 6px; }
  .cat-icon-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.4); background: transparent; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.15s; }
  .cat-icon-btn:hover { background: rgba(255,255,255,0.2); }
  .cat-body { padding: 10px 0 6px; }
  .cat-body.collapsed { display: none; }

  /* ROWS dentro do card */
  .item-row { display: grid; grid-template-columns: 1fr 1.6fr auto; gap: 8px; align-items: center; padding: 7px 14px; border-bottom: 1px solid rgba(240,98,146,0.08); }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: rgba(244,143,177,0.08); }
  .item-row input { width: 100%; border: 1.5px solid rgba(240,98,146,0.18); border-radius: 8px; padding: 5px 9px; font-size: 12px; font-family: 'DM Sans', sans-serif; background: rgba(255,255,255,0.85); color: #880e4f; outline: none; transition: border 0.2s; }
  .item-row input::placeholder { color: #f48fb1; }
  .item-row input:focus { border-color: #f06292; }
  .item-name-text { font-size: 13px; color: #880e4f; font-weight: 500; }
  .item-link-text a { font-size: 12px; color: #7b1fa2; text-decoration: none; word-break: break-all; }
  .item-link-text a:hover { text-decoration: underline; }
  .item-actions { display: flex; gap: 4px; }
  .go-btn { width: 26px; height: 26px; border-radius: 50%; border: none; background: linear-gradient(135deg,#f48fb1,#f06292); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: transform 0.15s; flex-shrink: 0; }
  .go-btn:hover { transform: scale(1.1); }
  .del-btn { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(240,98,146,0.3); background: transparent; color: #f48fb1; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.15s; flex-shrink: 0; }
  .del-btn:hover { background: #fce4ec; color: #c2185b; }
  .add-item-btn { display: flex; align-items: center; gap: 5px; margin: 8px 14px 4px; font-size: 11px; color: #f06292; cursor: pointer; background: none; border: 1.5px dashed rgba(240,98,146,0.35); border-radius: 8px; padding: 5px 10px; width: calc(100% - 28px); justify-content: center; transition: background 0.15s; font-family: 'DM Sans', sans-serif; }
  .add-item-btn:hover { background: rgba(240,98,146,0.07); }
  .cat-count { font-size: 11px; color: rgba(255,255,255,0.8); }

  /* LOCK */
  .lock-overlay { position: fixed; inset: 0; background: rgba(255,240,245,0.97); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 50; }
  .lock-overlay .lock-icon { font-size: 44px; color: #f06292; }
  .lock-overlay p { font-size: 14px; color: #880e4f; }
  .lock-overlay input { border: 2px solid rgba(240,98,146,0.3); border-radius: 12px; padding: 10px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: #880e4f; outline: none; text-align: center; letter-spacing: 2px; background: #fff; width: 220px; }
  .lock-overlay input:focus { border-color: #f06292; }
  .unlock-btn { background: linear-gradient(90deg,#e91e8c,#f06292); color: #fff; border: none; border-radius: 20px; padding: 10px 30px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; }
  .err-msg { font-size: 12px; color: #c2185b; min-height: 18px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: #880e4f; color: #fff; padding: 9px 20px; border-radius: 20px; font-size: 13px; font-family: 'DM Sans', sans-serif; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #f48fb1; font-size: 14px; }
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-deco1"></div>
  <div class="gate-deco2"></div>
  <i class="ti ti-lock gate-icon"></i>
  <div class="gate-title">Meus Fornecedores</div>
  <div class="gate-sub">Digite a senha para entrar 🌸</div>
  <input type="password" id="gate-input" placeholder="••••••" onkeydown="if(event.key==='Enter')tryGate()" />
  <div class="gate-err" id="gate-err"></div>
  <button class="gate-btn" onclick="tryGate()">Entrar ✨</button>
</div>

<!-- LOCK EDIÇÃO -->
<div id="lock-overlay" class="lock-overlay" style="display:none">
  <i class="ti ti-lock lock-icon"></i>
  <p>Senha de edição</p>
  <input type="password" id="pwd-input" placeholder="••••••" onkeydown="if(event.key==='Enter')tryUnlock()" />
  <div class="err-msg" id="err-msg"></div>
  <button class="unlock-btn" onclick="tryUnlock()">Entrar como editora</button>
</div>

<!-- MAIN -->
<div class="page" id="main-page" style="display:none">
  <div class="main-header">
    <div class="deco1"></div>
    <div class="badge">✦ meus fornecedores ✦</div>
    <div class="main-title">Lista de Fornecedores</div>
    <div class="main-sub" id="mode-sub">modo visualização 👀</div>
    <div class="divider"><div class="divider-line"></div><i class="ti ti-heart" style="color:#f06292;font-size:15px"></i><div class="divider-line"></div></div>
  </div>

  <div class="top-bar">
    <div class="mode-bar">
      <button class="mode-btn active" id="btn-view" onclick="setMode('view')">👀 Ver</button>
      <button class="mode-btn" id="btn-edit" onclick="requestEdit()">✏️ Editar</button>
    </div>
    <button class="add-cat-btn" id="add-cat-btn" onclick="addCategory()" style="display:none">
      <i class="ti ti-plus"></i> Nova categoria
    </button>
  </div>

  <div class="cats-grid" id="cats-grid">
    <div class="empty-state">Carregando... 🌸</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, orderBy, query, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAFDh2Qlnn8-LGbKfz_4dXeorF4kh7Pfec",
    authDomain: "lista-fornecedores-bolsas.firebaseapp.com",
    projectId: "lista-fornecedores-bolsas",
    storageBucket: "lista-fornecedores-bolsas.firebasestorage.app",
    messagingSenderId: "673865354929",
    appId: "1:673865354929:web:aba5992d921be6d5b81c90"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const GATE_PASSWORD = 'Maltez';
  const EDITOR_PASSWORD = 'minhalista123';
  let isEditor = false;
  let editMode = false;
  let categories = [];
  let collapsed = {};

  if (sessionStorage.getItem('gate_ok') === '1') showMain();

  window.tryGate = () => {
    const val = document.getElementById('gate-input').value;
    if (val === GATE_PASSWORD) {
      sessionStorage.setItem('gate_ok', '1');
      showMain();
    } else {
      document.getElementById('gate-err').textContent = 'Senha incorreta 💔';
      document.getElementById('gate-input').value = '';
    }
  }

  function showMain() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main-page').style.display = 'block';
    startFirebase();
  }

  function startFirebase() {
    const catsRef = collection(db, 'categorias');
    const q = query(catsRef, orderBy('ordem'));
    onSnapshot(q, async (snap) => {
      categories = [];
      for (const d of snap.docs) {
        const itemsSnap = await getDocs(query(collection(db, 'categorias', d.id, 'items'), orderBy('ordem')));
        const items = itemsSnap.docs.map(i => ({ id: i.id, ...i.data() }));
        categories.push({ id: d.id, ...d.data(), items });
      }
      render();
    });
  }

  window.addCategory = async () => {
    await addDoc(collection(db, 'categorias'), { name: 'Nova categoria', ordem: categories.length });
  }

  window.deleteCategory = async (catId) => {
    if (!confirm('Deletar essa categoria e todos os itens?')) return;
    const itemsSnap = await getDocs(collection(db, 'categorias', catId, 'items'));
    for (const d of itemsSnap.docs) await deleteDoc(d.ref);
    await deleteDoc(doc(db, 'categorias', catId));
  }

  window.updateCatName = (catId, value) => {
    clearTimeout(window._cn);
    window._cn = setTimeout(async () => {
      await updateDoc(doc(db, 'categorias', catId), { name: value });
    }, 700);
  }

  window.addItem = async (catId, currentLen) => {
    await addDoc(collection(db, 'categorias', catId, 'items'), { name: '', link: '', ordem: currentLen });
  }

  window.updateItem = (catId, itemId, field, value) => {
    clearTimeout(window['_it_'+itemId]);
    window['_it_'+itemId] = setTimeout(async () => {
      await updateDoc(doc(db, 'categorias', catId, 'items', itemId), { [field]: value });
      showToast('✓ Salvo!');
    }, 800);
  }

  window.deleteItem = async (catId, itemId) => {
    await deleteDoc(doc(db, 'categorias', catId, 'items', itemId));
  }

  window.toggleCollapse = (catId) => {
    collapsed[catId] = !collapsed[catId];
    render();
  }

  window.requestEdit = () => {
    if (isEditor) { setMode('edit'); return; }
    document.getElementById('lock-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('pwd-input').focus(), 100);
  }

  window.tryUnlock = () => {
    const val = document.getElementById('pwd-input').value;
    if (val === EDITOR_PASSWORD) {
      isEditor = true;
      document.getElementById('lock-overlay').style.display = 'none';
      document.getElementById('pwd-input').value = '';
      document.getElementById('err-msg').textContent = '';
      setMode('edit');
    } else {
      document.getElementById('err-msg').textContent = 'Senha incorreta 💔';
      document.getElementById('pwd-input').value = '';
    }
  }

  window.setMode = (mode) => {
    editMode = mode === 'edit' && isEditor;
    document.getElementById('btn-view').classList.toggle('active', !editMode);
    document.getElementById('btn-edit').classList.toggle('active', editMode);
    document.getElementById('mode-sub').textContent = editMode ? 'modo edição ✏️' : 'modo visualização 👀';
    document.getElementById('add-cat-btn').style.display = editMode ? 'inline-flex' : 'none';
    render();
  }

  function render() {
    const grid = document.getElementById('cats-grid');
    if (!categories.length) {
      grid.innerHTML = `<div class="empty-state">${editMode ? 'Clique em "+ Nova categoria" para começar! 🌸' : 'Nenhuma categoria ainda 🌸'}</div>`;
      return;
    }
    grid.innerHTML = '';
    categories.forEach(cat => {
      const isCollapsed = collapsed[cat.id];
      const filledItems = cat.items.filter(i => i.name || i.link).length;
      const card = document.createElement('div');
      card.className = 'cat-card';
      card.innerHTML = `
        <div class="cat-header" onclick="toggleCollapse('${cat.id}')">
          <div class="cat-name">
            <i class="ti ti-tag" style="font-size:15px;opacity:0.8"></i>
            ${editMode
              ? `<input class="cat-name-input" value="${esc(cat.name)}" onclick="event.stopPropagation()" oninput="updateCatName('${cat.id}',this.value)" placeholder="Nome da categoria"/>`
              : esc(cat.name)
            }
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="cat-count">${filledItems} ${filledItems===1?'item':'itens'}</span>
            ${editMode ? `<button class="cat-icon-btn" onclick="event.stopPropagation();deleteCategory('${cat.id}')" aria-label="Deletar categoria"><i class="ti ti-trash"></i></button>` : ''}
            <i class="ti ${isCollapsed ? 'ti-chevron-down' : 'ti-chevron-up'}" style="color:#fff;font-size:14px"></i>
          </div>
        </div>
        <div class="cat-body ${isCollapsed ? 'collapsed' : ''}">
          ${cat.items.length === 0 && !editMode ? '<div style="text-align:center;padding:1rem;color:#f48fb1;font-size:12px">Nenhum item ainda</div>' : ''}
          ${cat.items.map(item => renderItem(cat.id, item)).join('')}
          ${editMode ? `<button class="add-item-btn" onclick="addItem('${cat.id}', ${cat.items.length})"><i class="ti ti-plus" style="font-size:12px"></i> Adicionar fornecedor</button>` : ''}
        </div>`;
      grid.appendChild(card);
    });
  }

  function renderItem(catId, item) {
    if (editMode) {
      return `<div class="item-row">
        <input type="text" placeholder="Nome..." value="${esc(item.name)}" oninput="updateItem('${catId}','${item.id}','name',this.value)"/>
        <input type="url" placeholder="https://..." value="${esc(item.link)}" oninput="updateItem('${catId}','${item.id}','link',this.value)"/>
        <div class="item-actions">
          <button class="go-btn" onclick="openLink('${esc(item.link)}')" aria-label="Abrir"><i class="ti ti-arrow-right"></i></button>
          <button class="del-btn" onclick="deleteItem('${catId}','${item.id}')" aria-label="Remover"><i class="ti ti-x"></i></button>
        </div>
      </div>`;
    } else {
      if (!item.name && !item.link) return '';
      const url = item.link ? (item.link.startsWith('http') ? item.link : 'https://'+item.link) : '';
      return `<div class="item-row">
        <div class="item-name-text">${esc(item.name)||'—'}</div>
        <div class="item-link-text">${url ? `<a href="${esc(url)}" target="_blank">${esc(item.link)}</a>` : '<span style="color:#f48fb1">—</span>'}</div>
        <div class="item-actions">${url ? `<button class="go-btn" onclick="openLink('${esc(url)}')" aria-label="Abrir"><i class="ti ti-arrow-right"></i></button>` : '<span style="width:26px"></span>'}</div>
      </div>`;
    }
  }

  window.openLink = (url) => { if (url) window.open(url, '_blank'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
